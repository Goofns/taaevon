name: taaevon
description: "Taaevon — cross-platform dual-curriculum (Math + Language) educational app with Abstract Geometric Minimalism."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  # >=3.31 for Color.withValues / Switch.activeThumbColor (migrated off the
  # deprecated withOpacity / activeColor by `dart fix`).
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

  # --- Active in scaffold ---
  flutter_bloc: ^8.1.6      # Unidirectional BLoC state management
  equatable: ^2.0.5         # Value equality for entities/states
  shared_preferences: ^2.2.3  # Lightweight key-value store for saved progress

  # --- Reserved for later phases (uncomment as features land) ---
  # sqflite: ^2.3.3         # Phase 1: bundled SQLite fact + lexicon DB
  # hive: ^2.2.3            # Phase 1: hot-path cache (<5ms reads)
  # hive_flutter: ^1.1.0
  # go_router: ^14.0.0      # Phase 2: navigation
  # uuid: ^4.4.0
  # just_audio: ^0.9.40     # Phase 3: pronunciation audio
  # flutter_math_fork: ^0.7.2  # Phase 3: LaTeX equation rendering
  # intl: ^0.19.0
  # dio: ^5.4.3             # Content sync
  # flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # bloc_test: ^9.1.7
  # mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    # Bundle the whole data dir so every seed file ships in the APK. Declaring
    # only facts_seed.json previously left lexicon_seed.json out of the bundle,
    # which crashed the language track at runtime ("Unable to load asset").
    - assets/data/
  # Bundled OFL variable fonts (one file per family covers all weights). Family
  # names match TaaevonTypography. Noto Sans covers Latin/Cyrillic/Greek; CJK and
  # Arabic still use the platform's system Noto fallback (the full CJK font is
  # ~16MB and intentionally not bundled). Licenses: assets/fonts/*-OFL.txt.
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Variable.ttf
